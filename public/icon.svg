<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="18" fill="#07090F"/>

  <!-- V monogram mark  centered, gold -->
  <!-- Left outer arm -->
  <line x1="18" y1="18" x2="50" y2="74" stroke="#C9A84C" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Right outer arm -->
  <line x1="82" y1="18" x2="50" y2="74" stroke="#C9A84C" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left inner depth line -->
  <line x1="30" y1="18" x2="50" y2="65" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" opacity="0.38"/>
  <!-- Right inner depth line -->
  <line x1="70" y1="18" x2="50" y2="65" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" opacity="0.38"/>
  <!-- Left architectural top cap -->
  <line x1="12" y1="18" x2="30" y2="18" stroke="#C9A84C" stroke-width="4.2" stroke-linecap="round"/>
  <!-- Right architectural top cap -->
  <line x1="70" y1="18" x2="88" y2="18" stroke="#C9A84C" stroke-width="4.2" stroke-linecap="round"/>
  <!-- Diamond apex ornament at bottom -->
  <polygon points="50,78 54.5,73.5 50,69 45.5,73.5" fill="#C9A84C"/>
</svg>
